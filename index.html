<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#0a1730" />
<title>Elvis: Snow Run — Sled Dog Racing</title>
<meta name="description" content="Draft a team of Siberian huskies led by Elvis and race the serum run to Nome in this 3D sled-dog racing adventure." />
<link rel="stylesheet" href="./css/style.css" />
</head>
<body>
<canvas id="c"></canvas>

<div id="boot" class="boot">
  <div class="boot-dog">🐺</div>
  <div class="boot-text">Harnessing the team…</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
  import './src/main.js';
  const boot = document.getElementById('boot');
  // Fade the boot splash once the first real frame has had a chance to render.
  requestAnimationFrame(() => requestAnimationFrame(() => {
    setTimeout(() => { boot.classList.add('gone'); }, 250);
  }));
</script>
</body>
</html>
